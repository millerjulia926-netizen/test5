services:
  - type: web
    name: test1-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: test1-db
          property: connectionString

databases:
  - name: test1-db
    plan: starter
    databaseName: notes
    user: notes
