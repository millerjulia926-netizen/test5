name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_type == 'tag' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  production-smoke:
    runs-on: ubuntu-latest
    needs: build-and-publish

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notes_prod
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/notes_prod
      SESSION_SECRET: deploy-smoke-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm ci --prefix client
      - run: npm run build
      - run: npm run start:production &
      - run: npx --yes wait-on http://localhost:3000/health --timeout 30000

      - name: Verify health endpoint
        run: |
          curl --fail http://localhost:3000/health
          curl --fail http://localhost:3000/

      - name: Verify auth signup flow
        run: |
          curl --fail -X POST http://localhost:3000/auth/signup \
            -H 'Content-Type: application/json' \
            -d '{"email":"deploy@example.com","password":"Password1"}'
